<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MFG Daily Sales Reports</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f5f7;
      color: #111;
    }

    .header {
      background: white;
      padding: 16px;
      border-bottom: 1px solid #ddd;
    }

    h1 {
      margin: 0;
      font-size: 20px;
    }

    .controls {
      padding: 12px 16px;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    select {
      width: 100%;
      padding: 10px;
      font-size: 16px;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 120px);
      border: none;
      background: white;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>MFG Daily Sales</h1>
  </div>

  <div class="controls">
    <select id="reportSelect">
      <option value="">Select a report...</option>
    </select>
  </div>

  <iframe id="reportFrame"></iframe>

  <script>
    fetch('./reports.json')
      .then(res => res.json())
      .then(reports => {
        const select = document.getElementById('reportSelect');

        const newestFirst = [...reports].reverse();

        newestFirst.forEach(report => {
          const option = document.createElement('option');
          option.value = `./reports/${report.file}`;
          option.textContent = report.label;
          select.appendChild(option);
        });

        if (reports.length > 0) {
          const latest = reports[reports.length - 1];
          const path = `./reports/${latest.file}`;
          document.getElementById('reportFrame').src = path;
          select.value = path;
        }
      })
      .catch(err => console.error('Failed to load reports.json:', err));

    document.getElementById('reportSelect').addEventListener('change', function () {
      document.getElementById('reportFrame').src = this.value;
    });
  </script>
</body>
</html>
