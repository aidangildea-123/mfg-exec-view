name: Daily MFG Sales Report

on:
  schedule:
    # 11:00 AM ET (16:00 UTC) — morning run, yesterday's final data
    - cron: '0 16 * * *'
    # 3:00 PM ET (20:00 UTC) — afternoon refresh of yesterday
    - cron: '0 20 * * *'
    # 8:00 PM ET (01:00 UTC next day) — evening refresh of yesterday
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      backfill_dates:
        description: 'Space-separated dates to backfill e.g. 2026-04-10 2026-04-11 2026-04-12 (leave blank for yesterday)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install cryptography requests

      - name: Generate daily report
        env:
          NS_ACCOUNT_ID:      ${{ secrets.NS_ACCOUNT_ID }}
          NS_CONSUMER_KEY:    ${{ secrets.NS_CONSUMER_KEY }}
          NS_CERTIFICATE_ID:  ${{ secrets.NS_CERTIFICATE_ID }}
          NS_PRIVATE_KEY:     ${{ secrets.NS_PRIVATE_KEY }}
        run: python generate_report.py ${{ inputs.backfill_dates }}

      - name: Commit and push report
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add docs/
          git diff --staged --quiet || git commit -m "Daily sales report $(date +'%Y-%m-%d')"
          git push