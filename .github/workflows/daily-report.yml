name: Daily MFG Sales Report

on:
  schedule:
    # Runs at 8:00 AM ET (13:00 UTC) every day
    - cron: '0 13 * * *'
  workflow_dispatch:
    # Also allows manual trigger from the GitHub Actions UI

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install cryptography requests

      - name: Generate daily report
        env:
          NS_ACCOUNT_ID:      ${{ secrets.NS_ACCOUNT_ID }}
          NS_CONSUMER_KEY:    ${{ secrets.NS_CONSUMER_KEY }}
          NS_CERTIFICATE_ID:  ${{ secrets.NS_CERTIFICATE_ID }}
          NS_PRIVATE_KEY:     ${{ secrets.NS_PRIVATE_KEY }}
        run: python generate_report.py

      - name: Commit and push report
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add docs/
          git diff --staged --quiet || git commit -m "Daily sales report $(date +'%Y-%m-%d')"
          git push
