name: Regenerate Report for Date

on:
  workflow_dispatch:
    inputs:
      report_date:
        description: 'Date to regenerate (YYYY-MM-DD)'
        required: true

permissions:
  contents: write

jobs:
  regenerate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install cryptography requests

      - name: Regenerate report for ${{ inputs.report_date }}
        env:
          NS_ACCOUNT_ID:     ${{ secrets.NS_ACCOUNT_ID }}
          NS_CONSUMER_KEY:   ${{ secrets.NS_CONSUMER_KEY }}
          NS_CERTIFICATE_ID: ${{ secrets.NS_CERTIFICATE_ID }}
          NS_PRIVATE_KEY:    ${{ secrets.NS_PRIVATE_KEY }}
        run: python generate_report.py ${{ inputs.report_date }}

      - name: Commit and push report
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add docs/
          git diff --staged --quiet || git commit -m "Regenerated report for ${{ inputs.report_date }}"
          git push
