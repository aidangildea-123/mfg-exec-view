<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MFG Live Snapshot</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "DM Sans", sans-serif;
  background: #f4f5f7;
  color: #111827;
}

.header {
  background: #fff;
  border-bottom: 1px solid #e5e7eb;
  padding: 14px 16px;
}

.status {
  padding: 16px;
  font-size: 13px;
  color: #6b7280;
}

.controls {
  background: #fff;
  padding: 16px;
  border-bottom: 1px solid #e5e7eb;
}

/* ---------- Date Picker ---------- */

.date-panel-card {
  background: #111827;
  color: #fff;
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 14px;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}

.date-panel-card:hover { opacity: 0.95; }

.month-details { margin-bottom: 10px; }

.month-summary {
  padding: 12px 16px;
  background: #fff;
  border-radius: 8px;
  font-weight: 700;
  cursor: pointer;
}

.month-body {
  padding: 10px;
}

.date-link {
  padding: 10px 12px;
  background: #fff;
  border-radius: 6px;
  margin-bottom: 6px;
  cursor: pointer;
}

.date-link.active {
  border: 1px solid #111827;
}

/* ---------- Dashboard ---------- */

.card {
  background: #fff;
  margin: 16px;
  padding: 16px;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
}

.metric {
  font-size: 26px;
  font-weight: 700;
}

.badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 20px;
}

.table {
  width: 100%;
  margin-top: 12px;
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid #f3f4f6;
}

</style>
</head>

<body>

<div class="header">
  <h2>Live Snapshot</h2>
  <div id="header-date"></div>
</div>

<div class="controls">
  <div id="datePickerPanel"></div>
</div>

<div id="status" class="status">Loading…</div>

<div id="app"></div>

<script>

function formatDate(d) {
  return new Date(d).toLocaleDateString("en-US", {
    weekday: "long",
    month: "long",
    day: "numeric",
    year: "numeric"
  });
}

function groupDates(dates) {
  const groups = {};
  dates.forEach(d => {
    const key = d.slice(0,7);
    if (!groups[key]) groups[key] = [];
    groups[key].push(d);
  });
  return groups;
}

function renderDatePicker(manifest, active) {
  const panel = document.getElementById("datePickerPanel");

  let html = "";

  // Latest badge
  html += `
    <div class="date-panel-card" onclick="loadReport('${manifest.latest}')">
      <div>
        <div style="font-size:10px;color:#9ca3af">Latest</div>
        <div style="font-weight:700">${formatDate(manifest.latest)}</div>
      </div>
      <div>›</div>
    </div>
  `;

  const groups = groupDates(manifest.dates);

  Object.keys(groups).sort().reverse().forEach(month => {

    const dates = groups[month].sort().reverse();

    html += `
      <details class="month-details">
        <summary class="month-summary">${month}</summary>
        <div class="month-body">
    `;

    dates.forEach(d => {
      html += `
        <div class="date-link ${d===active?"active":""}" onclick="loadReport('${d}')">
          ${formatDate(d)}
        </div>
      `;
    });

    html += `</div></details>`;
  });

  panel.innerHTML = html;
}

function renderDashboard(p) {
  document.getElementById("header-date").innerText = p.report_date;

  const rows = p.rows.map(r => `
    <div class="row">
      <span>${r.name}</span>
      <span>$${Math.round(r.sCur).toLocaleString()}</span>
    </div>
  `).join("");

  document.getElementById("app").innerHTML = `
    <div class="card">
      <div>Sales</div>
      <div class="metric">$${Math.round(p.summary.sales_current).toLocaleString()}</div>
    </div>

    <div class="card">
      ${rows}
    </div>
  `;
}

async function loadReport(dateStr) {
  document.getElementById("status").innerText = "Loading " + dateStr;

  try {
    const res = await fetch(`data/${dateStr}.json`);
    if (!res.ok) throw new Error("Missing data");

    const data = await res.json();

    renderDashboard(data);

    const manifest = await (await fetch("data/index.json")).json();
    renderDatePicker(manifest, dateStr);

    document.getElementById("status").innerText = "";

  } catch(e) {
    document.getElementById("status").innerText = "Error loading data";
  }
}

async function init() {
  const manifest = await (await fetch("data/index.json")).json();
  renderDatePicker(manifest, manifest.latest);
  loadReport(manifest.latest);
}

init();

</script>

</body>
</html>
